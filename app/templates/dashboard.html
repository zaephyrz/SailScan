<!DOCTYPE html>
<html>
<head>
    <title>SailScan🏴‍☠️</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .upload-area {
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            margin: 30px 0;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5a67d8;
        }
        .api-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .api-links a {
            color: #667eea;
            text-decoration: none;
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SailScan 🏴‍☠️</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-scans">0</div>
                <div>Total Scans</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="threats-found">0</div>
                <div>Threats Found</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="success-rate">100%</div>
                <div>Success Rate</div>
            </div>
        </div>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <h3>📁 Upload File for Analysis</h3>
            <p>Drag and drop or click to select file</p>
            <p>Max size: 100MB | Supported: EXE, DLL, PDF, DOC, JS, PY, APK</p>
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile(this.files[0])">
            <button onclick="document.getElementById('fileInput').click()">Select File</button>
        </div>
        
        <div id="scan-results"></div>
        
        <div class="api-links">
            <h3>API Endpoints:</h3>
            <a href="/docs" target="_blank">Interactive API Docs</a>
            <a href="/redoc" target="_blank">Alternative Docs</a>
            <a href="/health" target="_blank">Health Check</a>
        </div>
    </div>
    
    <script>
        // Update stats
        async function updateStats() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                document.getElementById('success-rate').textContent = 
                    data.status === 'healthy' ? '100%' : '0%';
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }
        
        // File upload
        async function uploadFile(file) {
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const resultsDiv = document.getElementById('scan-results');
            resultsDiv.innerHTML = `<p>🔄 Scanning ${file.name}...</p>`;
            
            try {
                // Try to use the scan endpoint if available
                const response = await fetch('/scan/test', {
                    method: 'POST',
                    body: JSON.stringify({filename: file.name, size: file.size}),
                    headers: {'Content-Type': 'application/json'}
                });
                
                const result = await response.json();
                resultsDiv.innerHTML = `
                    <div style="background:#d4edda; padding:15px; border-radius:5px; margin:10px 0;">
                        <h4>✅ Scan Complete</h4>
                        <p>File: ${file.name}</p>
                        <p>Status: ${result.status}</p>
                        <p>Message: ${result.message}</p>
                    </div>
                `;
                
                // Update scan count
                const scanCount = parseInt(document.getElementById('total-scans').textContent) + 1;
                document.getElementById('total-scans').textContent = scanCount;
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div style="background:#f8d7da; padding:15px; border-radius:5px; margin:10px 0;">
                        <h4>❌ Scan Failed</h4>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Initialize
        updateStats();
        setInterval(updateStats, 30000); // Update every 30 seconds
    </script>
</body>
</html>
